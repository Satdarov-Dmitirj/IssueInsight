databaseChangeLog:
  - changeSet:
      id: 005-insert-initial-data
      author: system
      comment: Заполнение таблиц начальными данными для анализа
      changes:
        # Вставка категорий
        - insert:
            tableName: categories
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: name, value: "Авторизация" }
              - column: { name: description, value: "Проблемы с входом и доступом" }
        - insert:
            tableName: categories
            columns:
              - column: { name: id, valueNumeric: 2 }
              - column: { name: name, value: "Оплата" }
              - column: { name: description, value: "Проблемы с платежами и картами" }
        - insert:
            tableName: categories
            columns:
              - column: { name: id, valueNumeric: 3 }
              - column: { name: name, value: "Техническая проблема" }
              - column: { name: description, value: "Ошибки системы и сбои" }

        # Вставка ключевых слов с весами
        - insert:
            tableName: keyword_weights
            columns:
              - column: { name: category_name, value: "Авторизация" }
              - column: { name: keyword, value: "логин" }
              - column: { name: weight, valueNumeric: 10.0 }
