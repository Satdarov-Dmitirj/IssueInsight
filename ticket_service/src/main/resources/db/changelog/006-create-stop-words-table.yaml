databaseChangeLog:
  - changeSet:
      id: 006-create-stop-words-table
      author: satdarov
      changes:
        - createTable:
            tableName: stop_words
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: word
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createIndex:
            indexName: idx_stop_words_word
            tableName: stop_words
            unique: true
            columns:
              - column:
                  name: word

  - changeSet:
      id: 006-seed-stop-words
      author: satdarov
      changes:
        - sql:
            sql: >
              INSERT INTO stop_words (word) VALUES
              ('без'),('во'),('для'),('до'),('за'),('из'),('ко'),
